name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/checkout@v6
        with:
          repository: npow/claude-skills
          path: .claude-skills
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check sagaflow tests
      - name: Type-check
        run: mypy sagaflow
      - name: Test
        run: CLAUDE_SKILLS_DIR=${{ github.workspace }}/.claude-skills pytest -v --cov=sagaflow
