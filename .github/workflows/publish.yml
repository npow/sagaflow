name: Publish to PyPI

# Publishes the package to PyPI when a GitHub Release is created. Uses PyPI's
# Trusted Publishers flow (OIDC) — no API tokens, no secrets. Authorization is
# registered on PyPI against this repo's Environment name ("pypi") + workflow
# filename ("publish.yml") + branch ("main" for releases cut from main).
#
# Before the first run, register this workflow as a Trusted Publisher here:
#   https://pypi.org/manage/account/publishing/
# with:
#   PyPI project name: sagaflow
#   Owner:             npow
#   Repository name:   sagaflow
#   Workflow name:     publish.yml
#   Environment name:  pypi

on:
  release:
    types: [published]
  workflow_dispatch:  # allow manual re-run from the Actions tab

jobs:
  build:
    name: Build sdist and wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build tooling
        run: python -m pip install --upgrade build
      - name: Build distributions
        run: python -m build
      - name: Show built artifacts
        run: ls -lh dist/
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # The environment must exist in the repo settings and be selected in the
    # PyPI Trusted Publisher config. A mismatch causes an OIDC audience error.
    environment:
      name: pypi
      url: https://pypi.org/project/sagaflow/
    permissions:
      # id-token is the ONLY permission needed for Trusted Publishing.
      # Don't add contents: write — this job doesn't touch the repo.
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Default is https://upload.pypi.org/legacy/ — explicit for clarity.
          repository-url: https://upload.pypi.org/legacy/
          # Fail (not skip) if the version already exists on PyPI.
          skip-existing: false
          # Verify the uploaded distributions before announcing success.
          verify-metadata: true
